<!doctype html>
<html lang="en">

<head>
  <title>Title</title>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light" style="background-color: #e3f2fd;">
    <!--El texto es un placeholder, deberíamos agregar una imagen ahí-->
    <a class="navbar-brand" href="#"> EmprendeU</a>
    <button class="navbar-toggler d-lg-none" type="button" data-toggle="collapse" data-target="#collapsibleNavId"
      aria-controls="collapsibleNavId" aria-expanded="false" aria-label="Toggle navigation"></button>
    <div class="collapse navbar-collapse" id="collapsibleNavId">
      <ul class="navbar-nav ml-auto mt-2 mt-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="#" data-toggle="modal" data-target="#registro">Registrarse</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-toggle="modal" data-target="#login">Iniciar Sesión</a>
        </li>
      </ul>
    </div>
  </nav>


  <!-- Modales para registro e inicio de sesión-->

  <!-- Modal -->
  <div class="modal fade" id="login" tabindex="-1" role="dialog" aria-labelledby="modelTitleId" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Inicia sesión en EmprendeU</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="container-fluid">
            <div class="input-group">
              <input type="email" name="correo" class="form-control" placeholder="Correo electrónico">
            </div>
            <div class="input-group">
              <input type="password" name="password" class="form-control" placeholder="Contraseña">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <div class="container-fluid">
            <div class="form-group" d-flex justify-content-center>
              <button type="button" class="btn btn-primary" data-dismiss="modal">Iniciar sesión</button>
            </div>
            <div class="form-group">
              No tienes cuenta?
              <a href="#" data-dismiss="modal" data-toggle="modal" data-target="#registro">Regístrate aquí!</a>
            </div>
          </div>
        </div>
    </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="registro" tabindex="-1" role="dialog" aria-labelledby="modelTitleId" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Crea tu cuenta de EmprendeU</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
        </div>
        <div class="modal-body">
          <form action="">
            <div class="row">
              <div class="col-6">
                <input type="text" name="nombre" id="nombre" class="form-control" placeholder="Nombre(s)">
              </div>
              <div class="col-6">
                <input type="text" name="apellido" class="form-control" placeholder="Apellido(s)">
              </div>
            </div>
            <input type="email" name="correo" id="correo_registro" class="form-control mt-3" placeholder="Correo electrónico" required>
            <input type="password" name="password" id="password_registro" class="form-control mt-3" placeholder="Contraseña" required>
            <input type="password" name="password_confirm" id="password_confirm" class="form-control mt-3" placeholder="Confirmar contraseña" required>
          </form>
        </div>
        <div class="modal-footer">
          <div class="container-fluid">
            <div class="form-group" d-flex justify-content-center>
              <button type="button" class="btn btn-primary" data-dismiss="modal">Registrar cuenta</button>
            </div>
            <div class="form-group">
              Ya tienes cuenta?
              <a href="#" data-dismiss="modal" data-toggle="modal" data-target="#login">Inicia sesión aquí!</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Optional JavaScript -->
  <!-- jQuery first, then Popper.js, then Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
    integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
    crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
    integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
    crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
    integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
    crossorigin="anonymous"></script>
</body>

</html>
