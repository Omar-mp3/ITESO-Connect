<!doctype html>
<html lang="en">

<head>
  <title>Mensajes - ITESO Connect</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/public/css/styles.css">

</head>

<body>
  <!-- Navbar del Perfil -->
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="user-feed.html">
        <span class="brand-badge">IC</span>
        <strong>ITESO-Connect</strong>
      </a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navPrincipal">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navPrincipal">
        <ul class="navbar-nav ml-auto align-items-center">
          <li class="nav-item px-2"><a class="nav-link" href="inbox.html"><i class="fa fa-comment"></i></a></li>
          <li class="nav-item px-2"><a class="nav-link" href="profile.html"><i class="fa fa-user"></i></a></li>
          <li class="nav-item" id="admin-link" style="display:none"><a class="nav-link" href="admin.html"><i
                class="fa fa-shield"></i></a></li>
          <li class="nav-item pl-lg-3"><a class="nav-link text-danger" href="#" data-logout>Cerrar sesión</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenedor Principal (Integración de Bandeja de Entrada) -->
  <div class="container-fluid chat-container">
    <div class="row justify-content-center h-100">

      <!-- Lista de Contactos -->
      <div class="col-md-4 col-xl-3 chat">
        <div class="card mb-sm-3 mb-md-0 contacts_card">
          <div class="card-header">
            <div class="input-group">
              <input type="text" id="user-search" placeholder="Buscar usuario..." class="form-control search">
              <div class="input-group-prepend">
                <span class="input-group-text search_btn"><i class="fa fa-search"></i></span>
              </div>
            </div>
          </div>
          <div class="card-body contacts_body">
            <ul class="contacts p-0">
              <!--Contactos, opcional-->
            </ul>
          </div>
          <div class="card-footer"></div>
        </div>
      </div>

      <!-- Ventana de Chat -->
      <div class="col-md-8 col-xl-6 chat">
        <div class="card">
          <div class="card-header msg-head">
            <div class="d-flex bd-highlight align-items-center">
              <div class="img-cont mr-2">
                <img src="https://ui-avatars.com/api/?name=?&background=7C3AED&color=fff" class="rounded-circle"
                  width="40" height="40" id="chat-header-avatar">
              </div>
              <div class="user-info">
                <span class="font-weight-bold" id="chat-header-name">Selecciona una conversación</span>
                <p class="mb-0 small text-muted" id="chat-header-sub">Busca un usuario para empezar</p>
              </div>
            </div>
          </div>

          <div class="card-body msg-card-body overflow-auto" style="max-height: 60vh;">
            <p class="text-center text-muted py-5">Selecciona una conversación o busca un usuario para comenzar.</p>
          </div>

          <div class="card-footer d-flex align-items-center gap-2" style="gap: 0.75rem;">
            <input type="text" id="pm-comment-input" class="modal-input mb-0" placeholder="Escribe un mensaje...">
            <button class="btn-modal-primary" id="pm-send-btn" style="width: auto; margin:0; padding: .6rem 1rem;"
              disabled>
              <i class="fa fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <div>
      <span class="brand-badge-footer">IC</span>
      <span class="footer-brand-name">ITESO-Connect</span>
    </div>
    <p>© 2026 ITESO-Connect. La red social para emprendedores universitarios.</p>
  </footer>
  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
  <script src="/public/js/auth.js"></script>
  <script src="/public/js/messages.js"></script>
</body>

</html>
